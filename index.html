<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Perkalate — Every reward, one place.</title>
  <meta name="description" content="Perkalate connects all your loyalty programs — airlines, coffee, groceries, hotels, and more. One app. Every point. Join the waitlist.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #120a24;
      --p1:     #7c3aed;
      --p2:     #5b21b6;
      --accent: #a78bfa;
      --soft:   #d8ccff;
      --white:  #ffffff;
      --w70:    rgba(255,255,255,0.70);
      --w45:    rgba(255,255,255,0.45);
      --w12:    rgba(255,255,255,0.12);
      --w07:    rgba(255,255,255,0.07);
    }

    html, body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden; /* single screen — no scroll */
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 95% 62% at 50% -5%, rgba(139,92,246,0.42) 0%, transparent 68%),
        radial-gradient(ellipse 70% 42% at 18% 75%, rgba(59,130,246,0.18) 0%, transparent 62%),
        radial-gradient(ellipse 60% 40% at 85% 78%, rgba(167,139,250,0.16) 0%, transparent 62%);
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        repeating-conic-gradient(
          from 0deg at 50% 42%,
          rgba(196,181,253,0.11) 0deg,
          rgba(196,181,253,0.11) 2deg,
          rgba(196,181,253,0) 2deg,
          rgba(196,181,253,0) 16deg
        );
      mask-image: radial-gradient(ellipse 88% 70% at 50% 45%, rgba(0,0,0,0.8) 0%, transparent 72%);
      -webkit-mask-image: radial-gradient(ellipse 88% 70% at 50% 45%, rgba(0,0,0,0.8) 0%, transparent 72%);
      opacity: .45;
    }

    /* Single screen container */
    .page {
      position: relative; z-index: 1;
      height: 100%; height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: env(safe-area-inset-top, 16px) 24px env(safe-area-inset-bottom, 20px);
      text-align: center;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Logo ── */
    .logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; padding-top: 16px;
    }
    .logo img {
      width: 42px; height: 42px; border-radius: 12px; object-fit: cover;
      box-shadow: 0 0 0 1.5px rgba(167,139,250,0.5), 0 0 18px rgba(124,58,237,0.55), 0 0 36px rgba(124,58,237,0.2);
    }
    .logo span { font-size: 26px; font-weight: 800; letter-spacing: -.03em; color: var(--white); }

    /* ── Orbital Scene ── */
    .scene {
      position: relative;
      width: min(260px, 62vw); height: min(260px, 62vw);
      flex-shrink: 0;
    }

    .glow {
      position: absolute; width: 168px; height: 168px;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: radial-gradient(circle, rgba(124,58,237,0.62) 0%, rgba(167,139,250,0.22) 45%, transparent 74%);
      filter: blur(20px); border-radius: 50%;
      animation: gp 3.5s ease-in-out infinite;
    }
    @keyframes gp {
      0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1);}
      50%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}
    }

    .ring {
      position: absolute; border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
    }
    .ri { width: 58%; height: 58%; min-width:140px; min-height:140px; border:1.5px solid rgba(216,204,255,0.4); }
    .ro { width: 94%; height: 94%; min-width:236px; min-height:236px; border: 1px solid rgba(196,181,253,0.24); }

    /* Phone */
    .phone {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: min(94px, 22vw); height: min(168px, 39vw);
      background: linear-gradient(160deg, #1c0f3f, #0e0720);
      border-radius: 18px;
      border: 1.5px solid rgba(167,139,250,0.4);
      box-shadow: 0 0 50px rgba(124,58,237,0.35), 0 16px 48px rgba(0,0,0,0.6);
      overflow: hidden;
      animation: pf 7s ease-in-out infinite;
      z-index: 2;
    }
    @keyframes pf {
      0%,100%{transform:translate(-50%,-50%) translateY(0) rotate(-.5deg);}
      50%{transform:translate(-50%,-50%) translateY(-8px) rotate(.5deg);}
    }
    .ps {
      position:absolute; inset:7px; border-radius:12px;
      background:#0a0a14;
      overflow:hidden;
      border: 1px solid rgba(216,204,255,0.16);
    }
    .phone-home {
      position:absolute;
      top:0; left:0; right:0; bottom:0;
      width:100%; height:100%;
      object-fit:cover;
      object-position: top;
      pointer-events:none;
      filter: saturate(1.05) contrast(1.04);
    }
    .ps::after {
      content:'';
      position:absolute; inset:0;
      background:linear-gradient(to bottom, rgba(8,8,16,.08) 0%, rgba(8,8,16,.02) 24%, rgba(8,8,16,.18) 100%);
      pointer-events:none;
    }

    /* Orbital tracks */
    .orbit-track {
      position: absolute; top: 50%; left: 50%; width: 0; height: 0;
    }
    .orbiter {
      position: absolute;
      top: -31px; left: -31px;
      width: 62px; height: 62px;
      border-radius: 16px;
      background: rgba(26,16,48,0.88);
      border: 1px solid rgba(216,204,255,0.35);
      box-shadow: 0 8px 22px rgba(0,0,0,0.4), 0 0 18px rgba(124,58,237,0.25);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .orbiter img { width: 40px; height: 40px; object-fit: contain; border-radius: 8px; }

    /* True orbit — rotate arm, counter-rotate icon */
    .t1{animation:oCW 11s linear infinite;}
    .t2{animation:oCW 11s linear infinite;animation-delay:-1.37s;}
    .t3{animation:oCW 11s linear infinite;animation-delay:-2.75s;}
    .t4{animation:oCW 11s linear infinite;animation-delay:-4.12s;}
    .t5{animation:oCW 11s linear infinite;animation-delay:-5.5s;}
    .t6{animation:oCW 11s linear infinite;animation-delay:-6.87s;}
    .t7{animation:oCW 11s linear infinite;animation-delay:-8.25s;}
    .t8{animation:oCW 11s linear infinite;animation-delay:-9.62s;}

    @keyframes oCW {
      from{transform:rotate(0deg) translateX(min(116px,27vw));}
      to{transform:rotate(360deg) translateX(min(116px,27vw));}
    }

    .t1 .orbiter{animation:ccW 11s linear infinite;}
    .t2 .orbiter{animation:ccW 11s linear infinite;animation-delay:-1.37s;}
    .t3 .orbiter{animation:ccW 11s linear infinite;animation-delay:-2.75s;}
    .t4 .orbiter{animation:ccW 11s linear infinite;animation-delay:-4.12s;}
    .t5 .orbiter{animation:ccW 11s linear infinite;animation-delay:-5.5s;}
    .t6 .orbiter{animation:ccW 11s linear infinite;animation-delay:-6.87s;}
    .t7 .orbiter{animation:ccW 11s linear infinite;animation-delay:-8.25s;}
    .t8 .orbiter{animation:ccW 11s linear infinite;animation-delay:-9.62s;}

    @keyframes ccW {
      from{transform:rotate(0deg);}
      to{transform:rotate(-360deg);}
    }

    /* ── Middle section ── */
    .mid { display: flex; flex-direction: column; align-items: center; gap: 0; margin-top: -12px; }

    .proof {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 14px;
    }
    .avatars { display: flex; }
    .av {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--p1), #4c1d95);
      border: 2px solid var(--bg);
      margin-left: -10px;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .av:first-child { margin-left: 0; }
    .proof-txt { font-size: 13px; font-weight: 500; color: var(--soft); }
    .proof-txt strong { font-weight: 800; color: #fff; }
    .ldot { width:6px;height:6px;border-radius:50%;background:#34d399;animation:blink 2s ease-in-out infinite; }
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

    h1 {
      font-size: clamp(34px, 9vw, 52px);
      font-weight: 900;
      line-height: 1.03;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
      background: linear-gradient(155deg, #fff 30%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 .accent {
      background: linear-gradient(135deg, #fbbf24, #f59e0b, #fcd34d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.55;
      color: var(--w70);
      max-width: 340px;
      margin: 0 auto;
    }

    /* ── Bottom section ── */
    .bottom { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 0; }

    /* Form */
    .wl-form {
      display: flex; gap: 8px;
      width: 100%;
      background: var(--w07);
      border: 1px solid var(--w12);
      border-radius: 100px;
      padding: 5px 5px 5px 20px;
      backdrop-filter: blur(16px);
      transition: border-color .25s, box-shadow .25s;
      margin-bottom: 14px;
    }
    .wl-form:focus-within {
      border-color: rgba(124,58,237,.75);
      box-shadow: 0 0 0 3px rgba(124,58,237,.18);
    }
    .wl-input {
      flex:1; min-width:0;
      background:none; border:none; outline:none;
      font-family:inherit; font-size:15px; color:var(--white);
      caret-color: var(--accent);
    }
    .wl-input::placeholder { color: var(--w45); }
    .wl-btn {
      flex-shrink: 0;
      background: linear-gradient(135deg, #9333ea, #7c3aed, #6d28d9);
      color: var(--white); border: none; border-radius: 100px;
      padding: 12px 22px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(147,51,234,.65), 0 0 0 1px rgba(167,139,250,0.3);
      transition: transform .15s, box-shadow .2s;
      animation: ctaPulse 2.8s ease-in-out infinite;
    }
    @keyframes ctaPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(147,51,234,.65), 0 0 0 1px rgba(167,139,250,0.3); }
      50%       { box-shadow: 0 4px 28px rgba(147,51,234,.9), 0 0 0 3px rgba(167,139,250,0.2), 0 0 40px rgba(124,58,237,.25); }
    }
    .wl-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(147,51,234,.8); animation: none; }
    .wl-btn:active { transform: translateY(0); }

    .success {
      display:none; width:100%; padding:16px 24px;
      background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.3);
      border-radius:16px; font-size:16px; font-weight:600;
      margin-bottom:14px;
      animation:fu .4s ease;
    }
    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .signin {
      display:block; font-size:13px; color:var(--w45);
      text-decoration:none; margin-bottom:16px;
      transition: color .2s;
    }
    .signin:hover { color: var(--w70); }
    .signin em { color: var(--soft); font-style:normal; }

    /* Brand icon row — infinite marquee scroll */
    .brand-rail {
      position: relative; width: 100%; overflow: hidden;
    }
    .brand-rail::before, .brand-rail::after {
      content: ''; position: absolute; top: 0; bottom: 0; width: 52px; z-index: 2; pointer-events: none;
    }
    .brand-rail::before {
      left: 0;
      background: linear-gradient(to right, var(--bg) 0%, transparent 100%);
    }
    .brand-rail::after {
      right: 0;
      background: linear-gradient(to left, var(--bg) 0%, transparent 100%);
    }
    .brand-track {
      display: flex; align-items: center;
      gap: 12px; flex-wrap: nowrap; padding: 4px 0;
      width: max-content;
      animation: marquee 28s linear infinite;
    }
    .brand-rail:hover .brand-track { animation-play-state: paused; }
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .bi {
      width: 44px; height: 44px; border-radius: 12px;
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 6px 16px rgba(0,0,0,0.22);
    }
    .bi img { width: 30px; height: 30px; object-fit: contain; border-radius: 5px; }

    /* ── Responsive: ensure it all fits ── */
    @media (max-width: 430px) {
      .page { padding-left: 16px; padding-right: 16px; }
      .scene { width: min(236px, 66vw); height: min(236px, 66vw); }
      .phone { width: min(88px, 24vw); height: min(156px, 42vw); }
      .phone-home { transform: scale(.173); }
      .orbiter { width: 52px; height: 52px; top: -26px; left: -26px; border-radius: 14px; }
      .orbiter img { width: 34px; height: 34px; }
      @keyframes oCW {
        from{transform:rotate(0deg) translateX(min(104px,29vw));}
        to{transform:rotate(360deg) translateX(min(104px,29vw));}
      }
      h1 { font-size: 40px; }
      .logo span { font-size: 22px; }
      .logo img { width: 36px; height: 36px; }
      .wl-form { padding-left: 14px; }
      .wl-btn { padding: 11px 16px; font-size: 13px; }
      .brand-track { gap: 8px; }
      .bi { width: 36px; height: 36px; border-radius: 10px; }
      .bi img { width: 24px; height: 24px; }
    }

    @media (max-height: 700px) {
      .scene { width: 210px; height: 210px; }
      h1 { font-size: 30px; }
      .sub { font-size: 13px; }
    }
    @media (max-height: 600px) {
      .brand-icons { display: none; }
      .scene { width: 172px; height: 172px; }
    }
  </style>
</head>
<body>
<main class="page">

  <!-- Logo -->
  <a class="logo" href="/">
    <img src="images/perkalate-logo.jpg" alt="Perkalate">
    <span>Perkalate</span>
  </a>

  <!-- Orbital Scene -->
  <div class="scene" aria-hidden="true">
    <div class="glow"></div>
    <div class="ring ri"></div>
    <div class="ring ro"></div>

    <div class="phone">
      <div class="ps">
        <img class="phone-home" src="phone-preview.jpg" alt="Perkalate app preview" loading="lazy">
      </div>
    </div>

    <div class="orbit-track t1"><div class="orbiter"><img src="https://www.google.com/s2/favicons?domain=starbucks.com&sz=64" alt="" onerror="this.parentElement.innerHTML='☕'"></div></div>
    <div class="orbit-track t2"><div class="orbiter"><img src="https://www.google.com/s2/favicons?domain=delta.com&sz=64"     alt="" onerror="this.parentElement.innerHTML='Δ'"></div></div>
    <div class="orbit-track t3"><div class="orbiter"><img src="https://www.google.com/s2/favicons?domain=amazon.com&sz=64"    alt="" onerror="this.parentElement.innerHTML='📦'"></div></div>
    <div class="orbit-track t4"><div class="orbiter"><img src="https://www.google.com/s2/favicons?domain=marriott.com&sz=64"  alt="" onerror="this.parentElement.innerHTML='🏨'"></div></div>
    <div class="orbit-track t5"><div class="orbiter"><img src="https://www.google.com/s2/favicons?domain=target.com&sz=64"    alt="" onerror="this.parentElement.innerHTML='🎯'"></div></div>
    <div class="orbit-track t6"><div class="orbiter"><img src="https://www.google.com/s2/favicons?domain=chase.com&sz=64"     alt="" onerror="this.parentElement.innerHTML='💳'"></div></div>
    <div class="orbit-track t7"><div class="orbiter"><img src="https://www.google.com/s2/favicons?domain=sephora.com&sz=64"    alt="" onerror="this.parentElement.innerHTML='✈'"></div></div>
    <div class="orbit-track t8"><div class="orbiter"><img src="https://www.google.com/s2/favicons?domain=americanexpress.com&sz=64"    alt="" onerror="this.parentElement.innerHTML='H'"></div></div>
  </div>

  <!-- Headline + sub -->
  <div class="mid">
    <div class="proof">
      <div class="avatars">
        <div class="av">A</div><div class="av">J</div><div class="av">M</div><div class="av">K</div>
      </div>
      <span class="proof-txt"><strong>2,400+</strong> on the waitlist</span>
      <div class="ldot"></div>
    </div>
    <h1>Every <span class="accent">reward</span>,<br>one place.</h1>
    <p class="sub">Connect every loyalty program you already belong to — airlines, coffee, groceries, hotels, and more.</p>
  </div>

  <!-- Form + brand icons -->
  <div class="bottom">
    <form class="wl-form" id="wlForm" novalidate>
      <input class="wl-input" type="email" placeholder="Your email — we'll save you a spot" required autocomplete="email" inputmode="email">
      <button class="wl-btn" type="submit">Join Waitlist</button>
    </form>
    <div class="success" id="successMsg">🎉 You're on the list! We'll be in touch.</div>
    <a class="signin" href="home.html">Already have access? <em>Sign in →</em></a>

    <!-- Brand logo icons — scrolling marquee (different from orbital brands) -->
    <div class="brand-rail">
      <div class="brand-track" id="brandTrack">
        <!-- Set 1 -->
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=nike.com&sz=64" alt="Nike"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=united.com&sz=64" alt="United Airlines"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=hilton.com&sz=64" alt="Hilton"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=walmart.com&sz=64" alt="Walmart"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=ulta.com&sz=64" alt="Ulta"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=southwest.com&sz=64" alt="Southwest"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=lyft.com&sz=64" alt="Lyft"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=dunkindonuts.com&sz=64" alt="Dunkin"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=cvs.com&sz=64" alt="CVS"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=nordstrom.com&sz=64" alt="Nordstrom"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=spotify.com&sz=64" alt="Spotify"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=costco.com&sz=64" alt="Costco"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=adidas.com&sz=64" alt="Adidas"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=wholefoodsmarket.com&sz=64" alt="Whole Foods"></div>
        <!-- Set 2 (duplicate for seamless loop) -->
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=nike.com&sz=64" alt="Nike"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=united.com&sz=64" alt="United Airlines"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=hilton.com&sz=64" alt="Hilton"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=walmart.com&sz=64" alt="Walmart"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=ulta.com&sz=64" alt="Ulta"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=southwest.com&sz=64" alt="Southwest"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=lyft.com&sz=64" alt="Lyft"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=dunkindonuts.com&sz=64" alt="Dunkin"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=cvs.com&sz=64" alt="CVS"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=nordstrom.com&sz=64" alt="Nordstrom"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=spotify.com&sz=64" alt="Spotify"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=costco.com&sz=64" alt="Costco"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=adidas.com&sz=64" alt="Adidas"></div>
        <div class="bi"><img src="https://www.google.com/s2/favicons?domain=wholefoodsmarket.com&sz=64" alt="Whole Foods"></div>
      </div>
    </div>
  </div>

</main>

<script>
  document.getElementById('wlForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (!this.querySelector('input').value) return;
    this.style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  });
</script>
</body>
</html>
